<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityFinder Pro - Личный каталог мест</title>
    <!-- Подключаем Bootstrap для красивого дизайна -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: -50px;
        }
    </style>
</head>
<body>

    <!-- Главный блок (Лендинг) -->
    <div class="hero-section">
        <div class="container">
            <h1 class="display-4 fw-bold">CityFinder Pro</h1>
            <p class="lead">Создайте свою личную карту полезных мест в городе: кафе, сервисы, скрытые локации.</p>
        </div>
    </div>

    <!-- Формы Входа и Регистрации -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="form-container">
                    <ul class="nav nav-pills nav-justified mb-3" id="pills-tab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Вход</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Регистрация</button>
                        </li>
                    </ul>
                    
                    <div class="tab-content" id="pills-tabContent">
                        <!-- Форма Входа -->
                        <div class="tab-pane fade show active" id="pills-login" role="tabpanel">
                            <form id="forma-vkhoda">
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="vkhod-email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Пароль</label>
                                    <input type="password" class="form-control" id="vkhod-parol" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Войти</button>
                                <div id="vkhod-oshibka" class="text-danger mt-2 text-center" style="display: none;"></div>
                            </form>
                        </div>
                        
                        <!-- Форма Регистрации -->
                        <div class="tab-pane fade" id="pills-register" role="tabpanel">
                            <form id="forma-registracii">
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="reg-email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Пароль</label>
                                    <input type="password" class="form-control" id="reg-parol" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Город</label>
                                    <input type="text" class="form-control" id="reg-gorod">
                                </div>
                                <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                                <div id="reg-oshibka" class="text-danger mt-2 text-center" style="display: none;"></div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Скрипты Bootstrap и наш файл логики -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/frontend/app.js"></script>
</body>
</html>
